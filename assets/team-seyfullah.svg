<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg-s" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#3a342a"/>
      <stop offset="1" stop-color="#16161a"/>
    </radialGradient>
    <linearGradient id="fg-s" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6c98b"/>
      <stop offset="1" stop-color="#8b7d5e"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg-s)"/>

  <!-- Shoulders -->
  <path d="M20 200 C 30 140, 70 130, 100 130 C 130 130, 170 140, 180 200 Z"
        fill="url(#fg-s)" opacity="0.95"/>

  <!-- Head -->
  <circle cx="100" cy="92" r="38" fill="url(#fg-s)"/>

  <!-- Glasses (the old man) -->
  <g stroke="#16161a" stroke-width="2.5" fill="none">
    <circle cx="86" cy="92" r="8"/>
    <circle cx="114" cy="92" r="8"/>
    <line x1="94" y1="92" x2="106" y2="92"/>
  </g>

  <!-- Beard hint -->
  <path d="M78 110 Q 100 130 122 110 Q 118 122 100 124 Q 82 122 78 110 Z"
        fill="#16161a" opacity="0.3"/>

  <!-- Initials -->
  <text x="100" y="186" text-anchor="middle"
        font-family="Space Grotesk, sans-serif" font-size="11"
        font-weight="600" letter-spacing="3" fill="#e6c98b" opacity="0.5">SC</text>
</svg>
