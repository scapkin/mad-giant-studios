<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg-t" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#2a3340"/>
      <stop offset="1" stop-color="#16161a"/>
    </radialGradient>
    <linearGradient id="fg-t" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a8c5e0"/>
      <stop offset="1" stop-color="#5a7290"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg-t)"/>

  <!-- Shoulders -->
  <path d="M20 200 C 30 140, 70 130, 100 130 C 130 130, 170 140, 180 200 Z"
        fill="url(#fg-t)" opacity="0.95"/>

  <!-- Head -->
  <circle cx="100" cy="92" r="38" fill="url(#fg-t)"/>

  <!-- Headphones (the programmer) -->
  <g stroke="#16161a" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M62 92 C 62 60, 138 60, 138 92"/>
  </g>
  <rect x="56" y="84" width="14" height="22" rx="4" fill="#16161a"/>
  <rect x="130" y="84" width="14" height="22" rx="4" fill="#16161a"/>

  <!-- Eyes hint -->
  <circle cx="88" cy="94" r="2.5" fill="#16161a"/>
  <circle cx="112" cy="94" r="2.5" fill="#16161a"/>

  <!-- Slight smirk -->
  <path d="M90 112 Q 100 118 110 112" stroke="#16161a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Initials -->
  <text x="100" y="186" text-anchor="middle"
        font-family="Space Grotesk, sans-serif" font-size="11"
        font-weight="600" letter-spacing="3" fill="#a8c5e0" opacity="0.5">TFE</text>
</svg>
