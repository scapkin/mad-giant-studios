<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rd-grad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6c98b"/>
      <stop offset="1" stop-color="#b8493a"/>
    </linearGradient>
  </defs>

  <!-- Card 1 (back) -->
  <rect x="14" y="22" width="34" height="46" rx="5"
        transform="rotate(-12 31 45)"
        fill="#1d1d22" stroke="url(#rd-grad)" stroke-width="2"/>

  <!-- Card 2 (front) -->
  <rect x="32" y="14" width="34" height="46" rx="5"
        transform="rotate(8 49 37)"
        fill="#16161a" stroke="url(#rd-grad)" stroke-width="2"/>

  <!-- Spade pip on front card -->
  <g transform="translate(49 37) rotate(8)">
    <path d="M0 -10 C 7 -3, 7 4, 0 6 C -7 4, -7 -3, 0 -10 Z"
          fill="url(#rd-grad)"/>
    <rect x="-1" y="4" width="2" height="6" fill="url(#rd-grad)"/>
  </g>
</svg>
