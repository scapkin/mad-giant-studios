<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="mg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6c98b"/>
      <stop offset="1" stop-color="#c9a96e"/>
    </linearGradient>
  </defs>

  <!-- Mountain / giant silhouette frame -->
  <path d="M32 4 L60 56 H4 Z"
        stroke="url(#mg-grad)"
        stroke-width="2.5"
        stroke-linejoin="round"
        fill="rgba(201,169,110,0.06)"/>

  <!-- Inner peaks -->
  <path d="M18 56 L26 38 L32 48 L38 30 L46 56"
        stroke="url(#mg-grad)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- M G monogram dot -->
  <circle cx="32" cy="20" r="2.2" fill="url(#mg-grad)"/>
</svg>
