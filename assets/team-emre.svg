<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg-e" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#3a2a2a"/>
      <stop offset="1" stop-color="#16161a"/>
    </radialGradient>
    <linearGradient id="fg-e" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8a878"/>
      <stop offset="1" stop-color="#a35c4a"/>
    </linearGradient>
    <linearGradient id="hat-e" x1="0" y1="0" x2="0" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c9a96e"/>
      <stop offset="1" stop-color="#b8493a"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg-e)"/>

  <!-- Shoulders -->
  <path d="M20 200 C 30 140, 70 130, 100 130 C 130 130, 170 140, 180 200 Z"
        fill="url(#fg-e)" opacity="0.95"/>

  <!-- Head -->
  <circle cx="100" cy="96" r="38" fill="url(#fg-e)"/>

  <!-- Jester hat -->
  <g fill="url(#hat-e)">
    <path d="M62 76 Q 70 30 100 50 Q 130 30 138 76 Z"/>
    <circle cx="68" cy="42" r="5"/>
    <circle cx="132" cy="42" r="5"/>
    <circle cx="100" cy="48" r="5"/>
  </g>

  <!-- Hat band -->
  <rect x="60" y="74" width="80" height="6" fill="#16161a" opacity="0.5"/>

  <!-- Eyes (winking) -->
  <path d="M84 100 Q 88 96 92 100" stroke="#16161a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="112" cy="100" r="2.5" fill="#16161a"/>

  <!-- Big smile -->
  <path d="M86 116 Q 100 128 114 116" stroke="#16161a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Initials -->
  <text x="100" y="186" text-anchor="middle"
        font-family="Space Grotesk, sans-serif" font-size="11"
        font-weight="600" letter-spacing="3" fill="#e8a878" opacity="0.5">ES</text>
</svg>
